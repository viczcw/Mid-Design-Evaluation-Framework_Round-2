const Icon = ({ name, size = 18, className = "" }) => {
  const iconSvg =
    window.lucide && window.lucide.icons && window.lucide.icons[name]
      ? window.lucide.icons[name].toSvg({
          width: size,
          height: size,
          class: className,
        })
      : "";

  return (
    <span
      className="inline-flex"
      aria-hidden="true"
      dangerouslySetInnerHTML={{ __html: iconSvg }}
    />
  );
};

    const getCitationNumbers = (label) => {
      if (!label) return [];

      return String(label)
        .replace(/\s/g, "")
        .split(",")
        .flatMap((part) => {
          const rangeMatch = part.match(/^(\d+)[–-](\d+)$/);
          if (rangeMatch) {
            const start = Number(rangeMatch[1]);
            const end = Number(rangeMatch[2]);
            return Array.from({ length: end - start + 1 }, (_, idx) => start + idx);
          }

          const single = Number(part);
          return Number.isFinite(single) ? [single] : [];
        });
    };

    const getReferenceTooltip = (label) => {
      const citationNumbers = getCitationNumbers(label);
      const tooltipReferences = citationNumbers
        .map((num) => REFERENCES[num - 1] ? `${num}. ${REFERENCES[num - 1]}` : null)
        .filter(Boolean);

      return tooltipReferences.join("\n\n");
    };

    const Sup = ({ children }) => {
      const label = React.Children.toArray(children).join("");
      const tooltip = getReferenceTooltip(label);
      const citationRef = useRef(null);
      const [tooltipPosition, setTooltipPosition] = useState(null);

      const showTooltip = () => {
        if (!citationRef.current || !tooltip) return;

        const rect = citationRef.current.getBoundingClientRect();
        const tooltipWidth = 384;
        const safeLeft = Math.min(
          Math.max(rect.left + rect.width / 2, tooltipWidth / 2 + 12),
          window.innerWidth - tooltipWidth / 2 - 12
        );

        setTooltipPosition({
          left: safeLeft,
          top: Math.max(rect.top - 12, 12)
        });
      };

      const hideTooltip = () => {
        setTooltipPosition(null);
      };

      return (
        <sup className="inline-block">
          <span
            ref={citationRef}
            onMouseEnter={showTooltip}
            onMouseMove={showTooltip}
            onMouseLeave={hideTooltip}
            className="cursor-help"
          >
            {children}
          </span>

          {tooltip && tooltipPosition
            ? ReactDOM.createPortal(
                <div
                  style={{
                    position: "fixed",
                    left: `${tooltipPosition.left}px`,
                    top: `${tooltipPosition.top}px`,
                    transform: "translate(-50%, -100%)",
                    zIndex: 999999
                  }}
                  className="pointer-events-none w-96 max-w-[85vw] rounded-xl bg-gray-900 px-4 py-3 text-left text-[11px] font-normal leading-5 text-white shadow-2xl whitespace-pre-wrap"
                >
                  {tooltip}
                </div>,
                document.body
              )
            : null}
        </sup>
      );
    };

            <p>
              The <strong>Consolidated Framework for Implementation Research (CFIR)</strong> helps identify multilevel barriers and facilitators that may influence implementation outcomes. In mid-design evaluation planning, CFIR can be used to structure inquiry into contextual factors that may affect whether a health care innovation is perceived as appropriate, feasible, acceptable, adoptable, integrable, or sustainable in real-world settings.
            </p>
            <p>
              The updated CFIR includes five domains: <strong>Innovation</strong>, <strong>Outer Setting</strong>, <strong>Inner Setting</strong>, <strong>Individuals</strong>, and <strong>Implementation Process</strong>. Within each domain, CFIR constructs can inform interview guide development, qualitative coding, mixed-method interpretation, and anticipatory identification of implementation risks. Because CFIR is a generalized framework, teams should not examine every construct automatically. Instead, they should define the health care innovation, setting, relevant roles, and implementation process, then select and adapt constructs that are meaningful for the specific innovation and the individuals involved in implementing or delivering it.
            </p>
            <p>
              CFIR is especially useful for collecting data from individuals who have power and/or influence over implementation outcomes, such as organizational leaders, clinical leadership, future users, implementation support personnel, and other groups involved in implementation decisions. Although CFIR is most commonly applied through qualitative methods, it can also support structured interpretation by applying ratings of <strong>valence</strong>, or whether a construct functions as a barrier or facilitator, and <strong>strength</strong>, or how strongly the construct appears to influence implementation. These ratings should be interpreted carefully because responses about the “degree to which” a construct manifests may reflect both subjective judgment and objective contextual conditions.
            </p>

                            </ul>
                          ) : (
                            <p className="text-sm text-gray-500 italic">
                              No qualitative or mixed strategies selected.
                            </p>
                          )}
                        </div>

                        <div>
                          <h4 className="text-[11px] font-black uppercase tracking-widest text-purple-700 mb-2">
                            Quantitative evaluation strategies included
                          </h4>
                          {selectedQuantitativeStrategies.length > 0 ? (
                            <ul className="list-disc pl-5 space-y-1 text-sm text-gray-700 leading-relaxed">
                              {selectedQuantitativeStrategies.map((strategy) => (
                                <li key={strategy.name}>
                                  {strategy.name}{strategy.citation ? <Sup>{strategy.citation}</Sup> : null}
                                </li>
                              ))}
                            </ul>
                          ) : (
                            <p className="text-sm text-gray-500 italic">
                              No quantitative strategies selected.
                            </p>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>
          </div>
        );
      };

      const tabs = [
        { id: "instructions", label: "Guide Instructions", icon: "info" },
        { id: "selection", label: "Implementation Outcomes", icon: "layout-grid" },
        { id: "frameworks", label: "Guiding Frameworks", icon: "network" },
        { id: "stakeholders", label: "Interest-Holders", icon: "users" },
        { id: "strategies", label: "Evaluation Strategies", icon: "clipboard-list" },
        { id: "complete", label: "Complete Guide", icon: "book-open" },
        { id: "plan", label: "Evaluation Plan Builder", icon: "clipboard-check" },
      ];

      const renderCurrentView = () => {
        if (view === "instructions") return <FrameworkInstructionsView />;
        if (view === "selection") return <SelectionView />;
        if (view === "frameworks") return <FoundationalFrameworksView />;
        if (view === "stakeholders") return selectedOutcomes.length > 0 ? <StakeholderView /> : <SelectionView />;
        if (view === "strategies") return selectedOutcomes.length > 0 ? <EvaluationStrategiesView /> : <SelectionView />;
        if (view === "complete") return selectedOutcomes.length > 0 ? <CompleteFrameworkView /> : <SelectionView />;
        if (view === "plan") return selectedOutcomes.length > 0 ? <EvaluationPlanBuilderView /> : <SelectionView />;
        return <FrameworkInstructionsView />;
      };

      return (
        <div className="min-h-screen">
          <div className="max-w-6xl mx-auto px-4 py-6 md:px-6 md:py-8">
            <div className="mb-6">
              <div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                <div>
                  <p className="text-xs font-bold uppercase tracking-[0.22em] text-indigo-600 mb-2">
                    @Chuwen Zheng
                  </p>
                  <h1 className="text-3xl md:text-4xl font-black tracking-tight text-gray-900">
                    Mid-Design Evaluation Guide
                  </h1>
                  <p className="text-sm md:text-base text-gray-600 mt-2 max-w-full">
                    This Mid-Design Evaluation Guide is a structured decision-support tool developed for designers and implementers understand how to consider and evaluate implementation outcomes during mid-design.
                  </p>
                  <div className="mt-3 rounded-lg border-l-4 border-indigo-600 bg-indigo-50/60 p-3 max-w-full">
                    <p className="text-xs font-semibold uppercase tracking-wider text-indigo-700">Mid-design phase</p>
                    <p className="text-sm text-indigo-900 mt-1">
                      “Mid-design” refers to the phase of intervention development between the initial phases of problem definition, idea generation, and concept development (“front-end design”) and the later phases of piloting, validation testing, and scaled implementation (“back-end translation”).
                    </p>
                  </div>
                </div>
              </div>
            </div>

            <div className="sticky top-0 z-30 mb-6 print:hidden bg-gray-50 pb-3">
              <div className="bg-gray-50 border border-gray-200 rounded-2xl p-2 shadow-sm overflow-x-auto">
                <div className="flex flex-nowrap gap-1.5 min-w-max">
                  {tabs.map((tab) => {
                    const disabled = !["instructions", "selection", "frameworks"].includes(tab.id) && selectedOutcomes.length === 0;
                    const active = view === tab.id;

                    return (
                      <button
                        key={tab.id}
                        type="button"
                        onClick={() => !disabled && setView(tab.id)}
                        className={[
                          "px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 transition whitespace-nowrap",
                          active ? "bg-indigo-600 text-white shadow-sm" : "bg-white text-gray-700 border border-gray-200",
                          disabled ? "opacity-50 cursor-not-allowed" : "hover:bg-gray-100"
                        ].join(" ")}
                      >
                        <Icon
                          name={tab.icon}
                          size={14}
                          className={active ? "text-white" : "text-gray-500"}
                        />
                        {tab.label}
                      </button>
                    );
                  })}
                </div>
              </div>

              {view !== "instructions" && (
                <div className="mt-3 bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                  <div className="flex flex-col gap-4">
                    <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                      <div className="max-w-3xl">
                        <p className="text-sm font-bold text-gray-800">
                          Implementation outcome selection
                        </p>
                        <p className="mt-1 text-xs text-gray-500 leading-relaxed">
                          Click an implementation outcome to select or deselect it without returning to the Implementation Outcomes tab.
                        </p>
                      </div>

                      <div className="flex items-center gap-4 shrink-0">
                        <button
                          type="button"
                          onClick={() => setSelectedOutcomes(FRAMEWORK_DATA.map((outcome) => outcome.id))}
                          className="text-sm font-semibold text-indigo-600 hover:text-indigo-700"
                        >
                          Select all
                        </button>
                        <button
                          type="button"
                          onClick={() => {
                            setSelectedOutcomes([]);
                            setView("selection");
                          }}
                          className="text-sm font-semibold text-red-600 hover:text-red-700"
                        >
                          Clear selection
                        </button>
                      </div>
                    </div>

                    <div className="flex flex-wrap items-center gap-2.5">
                      {FRAMEWORK_DATA.map((outcome) => {
                        const tone = colorStyles[outcome.type];
                        const isSelected = selectedOutcomes.includes(outcome.id);

                        return (
                          <button
                            key={outcome.id}
                            type="button"
                            onClick={() => toggleOutcome(outcome.id)}
                            className={[
                              "inline-flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-bold transition",
                              isSelected
                                ? tone.pill
                                : "bg-gray-50 border-gray-200 text-gray-500 hover:bg-gray-100 hover:text-gray-700"
                            ].join(" ")}
                            title={isSelected ? `Deselect ${outcome.title}` : `Select ${outcome.title}`}
                          >
                            <span className={`w-2 h-2 rounded-full ${isSelected ? tone.solid : "bg-gray-300"}`}></span>
                            {outcome.title}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {renderCurrentView()}

            <div className="mt-8 pt-6 border-t border-gray-200 print:hidden">
              <div className="flex items-center justify-between gap-3">
                <button
                  type="button"
                  onClick={() => {
                    const currentIndex = tabs.findIndex((tab) => tab.id === view);
                    if (currentIndex > 0) {
                      setView(tabs[currentIndex - 1].id);
                    }
                  }}
                  disabled={view === "instructions"}
                  className={`px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition ${view === "instructions"
                    ? "bg-gray-100 text-gray-400 cursor-not-allowed"
                    : "bg-white border border-gray-200 text-gray-700 hover:bg-gray-50"
                    }`}
                >
                  <Icon
                    name="arrow-left"
                    size={16}
                    className={view === "instructions" ? "text-gray-400" : "text-gray-500"}
                  />
                  Back
                </button>

                <button
                  type="button"
                  onClick={() => {
                    const currentIndex = tabs.findIndex((tab) => tab.id === view);
                    if (currentIndex < tabs.length - 1) {
                      setView(tabs[currentIndex + 1].id);
                    }
                  }}
                  disabled={view === "plan" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))}
                  className={`px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition ${view === "plan" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))
                    ? "bg-gray-100 text-gray-400 cursor-not-allowed"
                    : "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm"
                    }`}
                >
                  Next step
                  <Icon
                    name="arrow-right"
                    size={16}
                    className={
                      view === "plan" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))
                        ? "text-gray-400"
                        : "text-white"
                    }
                  />
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
