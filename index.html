            const tone = colorStyles[outcome.type];
            return (
              <OutcomeSection key={outcome.id} tone={tone} title={outcome.title} subtitle={<span>{outcome.definition}</span>}>
                <div className="mb-3">
                  <span className={outcomeUseBubbleClass(outcome.type)}>
                    {measureLabel(outcome.type)}
                  </span>
                </div>

                <RelevantTermsBox terms={outcome.relevantTerms} className="mb-4" />

                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                  <div className="md:col-span-3">
                    <h4 className={`text-[10px] font-black uppercase tracking-widest mb-3 flex items-center gap-1 ${tone.accent}`}>
                      <Icon name="users" size={12} /> Interest-Holders Recommended to Evaluate{outcome.id === "implementation_cost" ? <Sup>10</Sup> : null}
                    </h4>
                    <div className="space-y-2">
                      {outcome.interestHolders.map((s, idx) => (
                        <div key={idx} className="flex items-start gap-2 text-[13px] font-semibold text-gray-800 leading-tight">
                          <div className={`min-w-[4px] h-4 rounded-full mt-0.5 ${tone.solid}`} />
                          {s}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="md:col-span-5 border-l border-gray-100 pl-0 md:pl-5">
                    <h4 className="text-[10px] font-black text-blue-700 uppercase tracking-widest mb-3 flex items-center gap-1">
                      <Icon name="help-circle" size={12} /> Qualitative Evaluation Strategies
                    </h4>
                    <div className="space-y-3">
                      <div className="rounded-xl border border-blue-100 bg-blue-50/30 p-3">
                        <h5 className="text-[12px] font-bold text-blue-900 mb-2">
                          Semi-structured interview<Sup>{outcome.interviewCitation}</Sup>
                        </h5>
                        <InterviewStrategyIntro outcomeTitle={outcome.title} />
                        <div className="space-y-3">
                          {outcome.topics.map((topic, i) => (
                            <TopicAccordion key={i} topic={topic} />
                          ))}
                        </div>
                      </div>
                      {outcome.qualitativeStrategies.map((item, i) => (
                        <StrategyAccordion key={i} item={item} color="indigo" />
                      ))}
                    </div>
                  </div>

                  <div className="md:col-span-4 border-l border-gray-100 pl-0 md:pl-5">
                    <h4 className="text-[10px] font-black text-purple-700 uppercase tracking-widest mb-3 flex items-center gap-1">
                      <Icon name="clipboard-check" size={12} /> Quantitative Evaluation Strategies
                    </h4>
                    <div className="space-y-3">
                      {outcome.quantitativeStrategies.length > 0 ? (
                        outcome.quantitativeStrategies.map((s, i) => (
                          <StrategyAccordion key={i} item={s} color="purple" />
                        ))
                      ) : (
                        <div className="rounded-xl border border-dashed border-gray-200 p-4 text-sm text-gray-500 bg-gray-50">
                          No quantitative strategies listed for this implementation outcome.
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </OutcomeSection>
            );
          })}

          <section className="print-page bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <div className="border-b border-gray-200 pb-3 mb-4">
              <h2 className="text-2xl font-bold">References</h2>
              <p className="text-sm text-gray-500 mt-1">Full reference list used in the framework.</p>
            </div>
            <div className="space-y-3 text-[13px] leading-relaxed text-gray-800">
              {REFERENCES.map((ref, idx) => (
                <p key={idx}>
                  <span className="font-semibold mr-2">{idx + 1}.</span>
                  {ref}
                </p>
              ))}
            </div>
          </section>
        </div>
      );


      const tabs = [
        { id: "instructions", label: "Guide Instructions", icon: "info" },
        { id: "selection", label: "Implementation Outcomes", icon: "layout-grid" },
        { id: "stakeholders", label: "Interest-Holders", icon: "users" },
        { id: "strategies", label: "Evaluation Strategies", icon: "clipboard-list" },
        { id: "complete", label: "Complete Guide", icon: "book-open" },
      ];

      const renderCurrentView = () => {
        if (view === "instructions") return <FrameworkInstructionsView />;
        if (view === "selection") return <SelectionView />;
        if (view === "stakeholders") return selectedOutcomes.length > 0 ? <StakeholderView /> : <SelectionView />;
        if (view === "strategies") return selectedOutcomes.length > 0 ? <EvaluationStrategiesView /> : <SelectionView />;
        if (view === "complete") return selectedOutcomes.length > 0 ? <CompleteFrameworkView /> : <SelectionView />;
        return <FrameworkInstructionsView />;
      };

      return (
        <div className="min-h-screen">
          <div className="max-w-6xl mx-auto px-4 py-6 md:px-6 md:py-8">
            <div className="mb-6">
              <div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                <div>
                  <p className="text-xs font-bold uppercase tracking-[0.22em] text-indigo-600 mb-2">
                    @Chuwen Zheng
                  </p>
                  <h1 className="text-3xl md:text-4xl font-black tracking-tight text-gray-900">
                    Mid-Design Evaluation Guide
                  </h1>
                  <p className="text-sm md:text-base text-gray-600 mt-2 max-w-full">
                    This Mid-Design Implementation Evaluation Guide is a structured decision-support tool developed to assess key implementation outcomes of medical innovations during the mid-design phase before full-scale implementation.
                  </p>
                  <div className="mt-3 rounded-lg border-l-4 border-indigo-600 bg-indigo-50/60 p-3 max-w-full">
                    <p className="text-xs font-semibold uppercase tracking-wider text-indigo-700">Mid-design phase</p>
                    <p className="text-sm text-indigo-900 mt-1">
                      Mid-design refers to the phase of health innovation development after a promising concept or solution direction has been selected, but before the design is finalized for full implementation, summative validation, or scale-up.
                    </p>
                  </div>
                  <p className="text-sm italic text-gray-600 mt-2 max-w-3xl">
                    To navigate the guide, select whichever implementation outcomes you are most interested in exploring. For reviewers who would like to examine the guide content more comprehensively, we suggest selecting all eight implementation outcomes to view the full set of guide content.
                  </p>
                </div>
                <div className="bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm">
                  <p className="text-[11px] uppercase tracking-wider font-bold text-gray-500">
                    Selected implementation outcomes
                  </p>
                  <p className="text-2xl font-black text-gray-900 leading-none mt-1">
                    {selectedOutcomes.length}
                  </p>
                </div>
              </div>
            </div>

            <div className="sticky top-0 z-20 bg-gray-50/95 backdrop-blur border border-gray-200 rounded-2xl p-2 shadow-sm mb-6 print:hidden">
              <div className="flex flex-wrap gap-2">
                {tabs.map((tab) => {
                       const disabled = !["instructions", "selection"].includes(tab.id) && selectedOutcomes.length === 0;
                       const active = view === tab.id;
                  return (
                    <button
                      key={tab.id}
                      type="button"
                      onClick={() => !disabled && setView(tab.id)}
                      className={[
                        "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition",
                        active ? "bg-indigo-600 text-white shadow-sm" : "bg-white text-gray-700 border border-gray-200",
                        disabled ? "opacity-50 cursor-not-allowed" : "hover:bg-gray-100"
                      ].join(" ")}
                    >
                      <Icon
                        name={tab.icon}
                        size={16}
                        className={active ? "text-white" : "text-gray-500"}
                      />
                      {tab.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {selectedOutcomes.length > 0 && (
              <div className="mb-5 print:hidden bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                <div className="flex flex-wrap items-center gap-2">
                  <p className="text-sm font-semibold text-gray-700 mr-1">Current selection:</p>
                  {getSelectedData.map((outcome) => {
                    const tone = colorStyles[outcome.type];
                    return (
                      <span
                        key={outcome.id}
                        className={`inline-flex items-center gap-2 px-3 py-1 rounded-full border text-xs font-bold ${tone.pill}`}
                      >
                        <span className={`w-2 h-2 rounded-full ${tone.solid}`}></span>
                        {outcome.title}
                      </span>
                    );
                  })}
                  <button
                    type="button"
                    onClick={() => {
                      setSelectedOutcomes([]);
                      setView("selection");
                    }}
                    className="ml-auto text-sm font-semibold text-red-600 hover:text-red-700"
                  >
                    Clear selection
                  </button>
                </div>
              </div>
            )}

            {renderCurrentView()}

            <div className="mt-8 pt-6 border-t border-gray-200 print:hidden">
              <div className="flex items-center justify-between gap-3">
                <button
                  type="button"
                  onClick={() => {
                    const currentIndex = tabs.findIndex((tab) => tab.id === view);
                    if (currentIndex > 0) {
                      setView(tabs[currentIndex - 1].id);
                    }
                  }}
                  disabled={view === "instructions"}
                  className={`px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition ${view === "instructions"
                    ? "bg-gray-100 text-gray-400 cursor-not-allowed"
                    : "bg-white border border-gray-200 text-gray-700 hover:bg-gray-50"
                    }`}
                >
                  <Icon
                    name="arrow-left"
                    size={16}
                    className={view === "instructions" ? "text-gray-400" : "text-gray-500"}
                  />
                  Back
                </button>

                <button
                  type="button"
                  onClick={() => {
                    const currentIndex = tabs.findIndex((tab) => tab.id === view);
                    if (currentIndex < tabs.length - 1) {
                      setView(tabs[currentIndex + 1].id);
                    }
                  }}
                  disabled={view === "complete" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))}
                  className={`px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition ${view === "complete" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))
                    ? "bg-gray-100 text-gray-400 cursor-not-allowed"
                    : "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm"
                    }`}
                >
                  Next step
                  <Icon
                    name="arrow-right"
                    size={16}
                    className={
                      view === "complete" || (selectedOutcomes.length === 0 && !["instructions", "selection"].includes(view))
                        ? "text-gray-400"
                        : "text-white"
                    }
                  />
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
